name: Test

on:
  pull_request:
  merge_group:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - name: Install dependencies
        run: uv sync --all-groups
        working-directory: agent

      - name: Run tests
        run: uv run pytest tests/ -v
        working-directory: agent
