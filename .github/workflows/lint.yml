name: Lint

on:
  pull_request:
  merge_group:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
          args: "check"
          src: "agent"

      - name: ruff format
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
          args: "format --check"
          src: "agent"
