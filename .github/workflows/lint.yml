name: Lint

on:
  pull_request:
  merge_group:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
          args: "check"
          src: "agent"

      - name: ruff format
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
          args: "format --check"
          src: "agent"

  ty:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"

      - name: Install dependencies
        run: uv sync --all-groups
        working-directory: agent

      - name: ty check
        run: uv run ty check . --exit-zero
        working-directory: agent
